name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Write production environment.ts
        run: |
          cat > src/environments/environment.ts <<'EOF'
          export const environment = {
            production: true,
            firebase: {
              apiKey: '${{ vars.FIREBASE_API_KEY }}',
              authDomain: '${{ vars.FIREBASE_AUTH_DOMAIN }}',
              projectId: '${{ vars.FIREBASE_PROJECT_ID }}',
              storageBucket: '${{ vars.FIREBASE_STORAGE_BUCKET }}',
              messagingSenderId: '${{ vars.FIREBASE_MESSAGING_SENDER_ID }}',
              appId: '${{ vars.FIREBASE_APP_ID }}',
              measurementId: '${{ vars.FIREBASE_MEASUREMENT_ID }}',
            },
            apiBaseUrl: '',
          };
          EOF

      - run: npm ci
      - run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/plate-rate/
